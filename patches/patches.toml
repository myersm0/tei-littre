# Indent-split patches for Littré dictionary XML
# Each entry is a single-line find-and-replace that inserts
# a </indent><indent> boundary at a register/usage transition.

# b.xml

# Line 48851: "Substantivement." floats bare after a <cit> block.
[[patches]]
file = "b.xml"
line = 48851
old = "Substantivement."
new = "</indent><indent>Substantivement."

# c.xml

# Line 76194: "Substantivement." trails a </cit> on the same line.
[[patches]]
file = "c.xml"
line = 76194
old = "</cit> Substantivement."
new = "</cit></indent><indent>Substantivement."

# Line 114492: "Familièrement." starts a new usage note mid-indent.
[[patches]]
file = "c.xml"
line = 114492
old = "Familièrement."
new = "</indent><indent>Familièrement."

# Line 182992: "Par extension," starts a new usage note mid-indent.
[[patches]]
file = "c.xml"
line = 182992
old = "Par extension,"
new = "</indent><indent>Par extension,"

